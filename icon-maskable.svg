<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680" width="680" height="680" role="img">
  <title>Grocify (maskable)</title>
  <desc>Grocify maskable icon — full bleed background with cart and rupee symbol within the safe zone</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a7a30"/>
      <stop offset="60%" stop-color="#5e7a2e"/>
      <stop offset="100%" stop-color="#c98c28"/>
    </linearGradient>
    <linearGradient id="carttray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#edf7dc"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background (maskable icons must fill entire canvas) -->
  <rect x="0" y="0" width="680" height="680" fill="url(#bg)"/>
  <circle cx="640" cy="80" r="140" fill="rgba(255,248,210,0.07)"/>
  <circle cx="60" cy="640" r="110" fill="rgba(255,255,255,0.05)"/>

  <!--
    Maskable safe zone = inner 80% of canvas = x:68 to x:612, y:68 to y:612
    All key content is kept inside this zone.
  -->

  <!-- Cart handle arc -->
  <path d="M 268 308 Q 268 218 340 218 Q 412 218 412 308" fill="none" stroke="white" stroke-width="24" stroke-linecap="round" opacity="0.88"/>

  <!-- Cart rim bar -->
  <rect x="202" y="296" width="276" height="32" rx="16" fill="white" opacity="0.92"/>

  <!-- Cart tray -->
  <rect x="218" y="320" width="244" height="156" rx="24" fill="url(#carttray)" opacity="0.97"/>

  <!-- ₹ symbol inside cart -->
  <text x="340" y="454" text-anchor="middle" font-size="132" font-weight="900" font-family="Arial, Helvetica, sans-serif" fill="#4a7a30" opacity="0.90">₹</text>

  <!-- Cart wheels -->
  <circle cx="278" cy="502" r="28" fill="white" opacity="0.96"/>
  <circle cx="278" cy="502" r="14" fill="#4a7a30" opacity="0.75"/>
  <circle cx="402" cy="502" r="28" fill="white" opacity="0.96"/>
  <circle cx="402" cy="502" r="14" fill="#4a7a30" opacity="0.75"/>
</svg>
